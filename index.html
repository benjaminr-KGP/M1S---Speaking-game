<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#FFF8F0">
<title>Pulse Check — Pronunciation Race</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;800&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FFF8F0;
    --surface:#FFFFFF;
    --surface-2:#EFE6FB;
    --accent:#2B9C8F;
    --success:#5FD068;
    --danger:#FF5C5C;
    --warning:#F2B705;
    --fun-1:#FF8A65;
    --fun-2:#FFD166;
    --text:#3B3552;
    --text-muted:#928BAA;
    --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    --font-display: 'Baloo 2', var(--sans);
    --font-soft: 'Quicksand', var(--sans);

    /* ---- Pastel theme (setup screen keeps its own names for the extra
       bubble colors, but now shares the same base values as the rest
       of the app) ---- */
    --setup-bg:#FFF8F0;
    --setup-surface:#FFFFFF;
    --setup-border:#EFE6FB;
    --setup-text:#3B3552;
    --setup-text-muted:#928BAA;
    --setup-accent:#6FCBC0;
    --setup-accent-deep:#2B9C8F;
    --setup-peach:#FFE5D4;
    --setup-mint:#DFF5EC;
    --setup-butter:#FFF1C9;
    --setup-lavender:#E9E2FF;
    --setup-pink:#FFE0EC;
    --setup-sky:#DCEEFF;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--text);font-family:var(--font-soft);overscroll-behavior:none;}
  body{display:flex;flex-direction:column;min-height:100vh;}
  button{font-family:inherit;}
  #app{flex:1;display:flex;flex-direction:column;}
  .screen{display:none;flex:1;flex-direction:column;padding:20px;max-width:720px;width:100%;margin:0 auto;}
  .screen.active{display:flex;}

  /* ---------- Setup (pastel, full-bleed) ---------- */
  .screen-setup{max-width:none;width:100%;padding:0;margin:0;background:var(--setup-bg);color:var(--setup-text);font-family:var(--font-soft);position:relative;overflow:hidden;}
  .setup-inner{max-width:720px;width:100%;margin:0 auto;padding:24px 20px 36px;position:relative;z-index:1;}
  .screen-setup::before, .screen-setup::after{content:'';position:absolute;border-radius:50%;filter:blur(50px);z-index:0;pointer-events:none;}
  .screen-setup::before{width:240px;height:240px;background:var(--setup-butter);opacity:.6;top:-70px;right:-70px;}
  .screen-setup::after{width:280px;height:280px;background:var(--setup-sky);opacity:.6;bottom:-90px;left:-90px;}

  .sound-bars{display:flex;align-items:flex-end;gap:5px;height:30px;margin-bottom:6px;}
  .sound-bars span{display:block;width:6px;border-radius:4px;transform-origin:bottom;animation:barBounce 1.1s ease-in-out infinite;}
  .sound-bars span:nth-child(1){background:#FF9F7D;animation-delay:0s;height:14px;}
  .sound-bars span:nth-child(2){background:var(--setup-accent-deep);animation-delay:.12s;height:26px;}
  .sound-bars span:nth-child(3){background:#FFC94D;animation-delay:.24s;height:18px;}
  .sound-bars span:nth-child(4){background:#7BB8E8;animation-delay:.36s;height:30px;}
  .sound-bars span:nth-child(5){background:#FF9F7D;animation-delay:.24s;height:20px;}
  .sound-bars span:nth-child(6){background:var(--setup-accent-deep);animation-delay:.12s;height:28px;}
  .sound-bars span:nth-child(7){background:#FFC94D;animation-delay:0s;height:15px;}
  @keyframes barBounce{0%,100%{transform:scaleY(.35);}50%{transform:scaleY(1);}}

  .title{font-family:var(--font-display);font-size:clamp(36px,9vw,52px);font-weight:800;letter-spacing:0;margin:4px 0 6px;color:var(--setup-text);}
  .title-pop{background:linear-gradient(90deg, #FF6F61, #FF9F7D);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .tagline{color:var(--setup-text-muted);margin:0 0 26px;font-size:16px;font-weight:600;}

  .field{margin-bottom:22px;}
  .field-label{display:block;font-size:15px;font-weight:700;color:var(--setup-text);margin-bottom:10px;}
  .field-label-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  .field-label-row .field-label{margin-bottom:0;}
  .edit-toggle{background:none;border:none;color:var(--setup-accent-deep);font-weight:700;font-size:13px;cursor:pointer;padding:5px 10px;border-radius:8px;font-family:inherit;}
  .edit-toggle:hover{background:var(--setup-surface);}

  /* Word bubbles — the primary, friendly view of the list */
  .bubble-grid{display:flex;flex-wrap:wrap;gap:9px;}
  .bubble-empty{color:var(--setup-text-muted);font-size:14px;padding:8px 2px;}
  .word-bubble{display:inline-flex;align-items:center;gap:5px;padding:10px 15px;border-radius:999px;font-weight:700;font-size:14.5px;color:var(--setup-text);box-shadow:0 2px 0 rgba(59,53,82,.06);}
  .bubble-stars{font-size:10px;opacity:.65;}
  .bubble-tag{font-size:11px;font-weight:800;opacity:.5;margin-right:1px;}
  .bubble-0{background:var(--setup-peach);}
  .bubble-1{background:var(--setup-mint);}
  .bubble-2{background:var(--setup-butter);}
  .bubble-3{background:var(--setup-lavender);}
  .bubble-4{background:var(--setup-pink);}
  .bubble-5{background:var(--setup-sky);}

  .edit-list-panel{margin-top:12px;}
  textarea{width:100%;min-height:150px;background:var(--setup-surface);border:2px solid var(--setup-border);border-radius:12px;color:var(--setup-text);padding:14px;font-family:var(--mono);font-size:14px;line-height:1.5;resize:vertical;}
  textarea:focus{outline:none;border-color:var(--setup-accent-deep);}
  .hint-text{color:var(--setup-text-muted);font-size:12px;margin-top:6px;line-height:1.5;}

  .mode-cards{display:flex;gap:12px;}
  .mode-cards label{flex:1;}
  .mode-card-inner{display:flex;flex-direction:column;align-items:center;gap:3px;padding:18px 10px;border-radius:18px;border:2.5px solid var(--setup-border);background:var(--setup-surface);cursor:pointer;transition:border-color .15s, background .15s, transform .15s, box-shadow .15s;}
  .mode-icon{font-size:30px;line-height:1;}
  .mode-name{font-weight:800;font-size:16px;color:var(--setup-text);}
  .mode-sub{font-size:12px;color:var(--setup-text-muted);font-weight:600;}
  input[type=radio]{display:none;}
  input[type=radio]:checked + .mode-card-inner{border-color:var(--setup-accent-deep);background:var(--setup-mint);box-shadow:0 4px 14px rgba(43,156,143,.18);transform:translateY(-2px);}
  input[type=radio]:checked + .mode-card-inner .mode-name{color:var(--setup-accent-deep);}

  .info-pills{display:flex;gap:10px;flex-wrap:wrap;}
  .info-pill{display:flex;align-items:center;gap:8px;background:var(--setup-surface);border:2px solid var(--setup-border);border-radius:999px;padding:10px 16px;font-size:13px;color:var(--setup-text-muted);font-weight:700;}
  .info-pill-icon{font-size:16px;}
  label.info-pill{cursor:pointer;}
  label.info-pill input{width:16px;height:16px;accent-color:var(--setup-accent-deep);margin:0;}

  .start-btn{width:100%;margin-top:14px;padding:24px;border-radius:20px;border:none;background:linear-gradient(135deg, #FF9F7D, #FFD166);color:#5C3A1E;font-family:var(--font-display);font-weight:800;font-size:22px;cursor:pointer;box-shadow:0 8px 0 rgba(92,58,30,.15);transition:transform .1s, box-shadow .1s;animation:startGlow 2.4s ease-in-out infinite;}
  .start-btn:disabled{background:var(--setup-border);color:var(--setup-text-muted);box-shadow:none;cursor:not-allowed;animation:none;}
  .start-btn:not(:disabled):active{transform:translateY(5px);box-shadow:0 3px 0 rgba(92,58,30,.15);}
  @keyframes startGlow{
    0%,100%{box-shadow:0 8px 0 rgba(92,58,30,.15), 0 0 0 0 rgba(255,159,125,.5);}
    50%{box-shadow:0 8px 0 rgba(92,58,30,.15), 0 0 0 11px rgba(255,159,125,0);}
  }
  .warn-banner{background:#FFF0EC;border:1.5px solid #FF9F7D;color:#9A3B22;padding:12px 14px;border-radius:12px;font-size:13px;margin-bottom:18px;line-height:1.5;font-weight:600;}

  /* ---------- Game ---------- */
  #game{padding-top:14px;}
  .game-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
  .end-link{color:var(--text-muted);font-size:13px;background:none;border:none;cursor:pointer;padding:6px;}
  .hud{display:flex;justify-content:space-between;font-family:var(--mono);font-size:13px;color:var(--text-muted);margin-bottom:10px;}
  .hud b{color:var(--text);}

  .pulse-wrap{position:relative;height:84px;background:var(--surface);border-radius:14px;overflow:hidden;margin-bottom:18px;}
  .pulse-wrap svg{width:100%;height:100%;display:block;}
  .pulse-wrap.spike{animation:spikeBounce .4s ease;}
  @keyframes spikeBounce{0%{transform:scale(1)}30%{transform:scale(1.03)}100%{transform:scale(1)}}
  .clock-badge{position:absolute;top:8px;right:10px;font-family:var(--mono);font-size:13px;background:rgba(0,0,0,.35);color:#fff;padding:3px 9px;border-radius:8px;}

  .stage{flex:1;display:flex;align-items:center;justify-content:center;text-align:center;padding:10px 4px;}
  .target{
    font-family:var(--font-display);
    font-weight:800;letter-spacing:0;color:transparent;
    -webkit-text-stroke:2.5px var(--text-muted);
    transition:color .35s ease, -webkit-text-stroke-color .4s ease, text-shadow .35s ease;
  }
  .target.mode-word{font-size:clamp(34px,9vw,68px);-webkit-text-stroke-width:2.5px;}
  .target.mode-sentence{font-size:clamp(20px,5vw,32px);line-height:1.4;max-width:95%;-webkit-text-stroke-width:1.5px;}

  /* Ambient "I'm open and listening" cue — loops the whole time the button is held */
  .target.listening{animation:targetBreathe 1.6s ease-in-out infinite;}
  @keyframes targetBreathe{
    0%,100%{-webkit-text-stroke-color:var(--text-muted);}
    50%{-webkit-text-stroke-color:var(--accent);}
  }
  /* Sharper one-shot flicker, retriggered each time a speech chunk actually arrives */
  .target.voice-pulse{animation:targetVoicePulse .25s ease;}
  @keyframes targetVoicePulse{
    0%{transform:scale(1);text-shadow:0 0 0 rgba(43,156,143,0);}
    50%{transform:scale(1.035);text-shadow:0 0 26px rgba(43,156,143,.5);}
    100%{transform:scale(1);text-shadow:0 0 0 rgba(43,156,143,0);}
  }
  .target.hit{
    color:var(--success);-webkit-text-stroke-color:var(--success);
    text-shadow:0 0 30px rgba(95,208,104,.55);
  }
  .target.miss{
    color:var(--danger);-webkit-text-stroke-color:var(--danger);
    text-shadow:0 0 30px rgba(255,92,92,.45);
    animation:targetMissShake .35s ease;
  }
  @keyframes targetMissShake{
    0%,100%{transform:translateX(0);}
    25%{transform:translateX(-6px);}
    75%{transform:translateX(6px);}
  }

  .heard-row{text-align:center;margin-bottom:18px;min-height:26px;}
  .heard-label{color:var(--text-muted);font-size:12px;text-transform:uppercase;letter-spacing:.05em;margin-right:6px;}
  .heard-text{font-family:var(--mono);font-size:15px;}
  .heard-text.live{color:var(--accent);}
  .heard-text.hit{color:var(--success);font-weight:700;}
  .heard-text.miss{color:var(--danger);}
  .heard-text.error{color:var(--warning);}
  .heard-text.idle{color:var(--text-muted);}

  .mic-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;padding-bottom:6px;}
  .mic-btn{width:clamp(120px,32vw,160px);height:clamp(120px,32vw,160px);border-radius:50%;border:3px solid var(--accent);background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:clamp(40px,10vw,56px);cursor:pointer;touch-action:none;user-select:none;-webkit-user-select:none;transition:transform .1s, box-shadow .15s, background .15s;box-shadow:0 4px 14px rgba(59,53,82,.08);}
  .mic-btn.active{background:var(--accent);transform:scale(1.06);box-shadow:0 0 0 14px rgba(43,156,143,.15);}
  .mic-btn.checking{background:var(--surface-2);border-color:var(--warning);opacity:.6;cursor:wait;pointer-events:none;animation:checkingPulse 0.9s ease-in-out infinite;}
  @keyframes checkingPulse{0%,100%{opacity:.55;}50%{opacity:.85;}}
  .mic-hint{color:var(--text-muted);font-size:13px;text-align:center;}
  .score-line{text-align:center;font-family:var(--mono);font-size:13px;color:var(--text-muted);margin-top:14px;}

  /* ---------- End screen ---------- */
  #end{align-items:center;justify-content:center;text-align:center;}
  .end-title{font-family:var(--font-display);font-size:clamp(28px,7vw,42px);font-weight:800;margin-bottom:6px;}
  .end-stats{color:var(--text-muted);font-size:16px;margin-bottom:30px;}
  .end-btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
  .end-btns button{padding:14px 22px;border-radius:12px;font-weight:700;font-size:15px;cursor:pointer;border:2px solid var(--surface-2);background:var(--surface);color:var(--text);}
  .end-btns button.primary{background:var(--accent);border-color:var(--accent);color:#FFFFFF;}

  @media (prefers-reduced-motion: reduce){
    .pulse-wrap.spike{animation:none;}
    .mic-btn{transition:none;}
    .mic-btn.checking{animation:none;}
    .target.listening{animation:none;}
    .target.voice-pulse{animation:none;}
    .target.miss{animation:none;}
    .sound-bars span{animation:none;transform:scaleY(.7);}
    .start-btn{animation:none;}
  }
</style>
</head>
<body>
<div id="app">

  <!-- ===================== SETUP SCREEN ===================== -->
  <section id="setup" class="screen screen-setup active">
   <div class="setup-inner">
    <div class="sound-bars" aria-hidden="true"><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
    <h1 class="title">Pulse <span class="title-pop">Check</span></h1>
    <p class="tagline">Say it loud, say it clear — keep the clock alive! 🎤</p>

    <div id="unsupportedWarning" class="warn-banner" style="display:none;">
      ⚠️ This browser doesn't support speech recognition. Use Chrome, Edge, or Safari (14.5+ on iPhone/iPad). Firefox is not supported.
    </div>

    <div class="field">
      <label class="field-label">🎯 Pick your challenge</label>
      <div class="mode-cards">
        <label>
          <input type="radio" name="mode" value="word" checked>
          <span class="mode-card-inner">
            <span class="mode-icon">🔤</span>
            <span class="mode-name">Words</span>
            <span class="mode-sub">Quick vocab sprint</span>
          </span>
        </label>
        <label>
          <input type="radio" name="mode" value="sentence">
          <span class="mode-card-inner">
            <span class="mode-icon">💬</span>
            <span class="mode-name">Sentences</span>
            <span class="mode-sub">Read it out loud</span>
          </span>
        </label>
      </div>
    </div>

    <div class="field">
      <div class="field-label-row">
        <label class="field-label" id="listLabel">📝 Word list</label>
        <button type="button" id="editListToggle" class="edit-toggle">✏️ Edit</button>
      </div>
      <div id="bubbleGrid" class="bubble-grid"></div>
      <div id="editListPanel" class="edit-list-panel" style="display:none;">
        <textarea id="listInput" spellcheck="false"></textarea>
        <div class="hint-text" id="listHint"></div>
      </div>
    </div>

    <div class="field">
      <div class="info-pills">
        <div class="info-pill">
          <span class="info-pill-icon">⏱️</span>
          <span id="roundLengthDisplay"></span>
        </div>
        <label class="info-pill">
          <input type="checkbox" id="shuffleCheck" checked>
          <span class="info-pill-icon">🔀</span>
          <span>Shuffle order</span>
        </label>
      </div>
    </div>

    <button id="startBtn" class="start-btn">Let's go! 🚀</button>
   </div>
  </section>

  <!-- ===================== GAME SCREEN ===================== -->
  <section id="game" class="screen">
    <div class="game-top">
      <button class="end-link" id="quitBtn">✕ End round</button>
      <span class="end-link" id="modeLabel"></span>
    </div>

    <div class="hud">
      <span>Item <b id="progressText">0/0</b></span>
      <span>Cleared <b id="clearedText">0</b></span>
    </div>

    <div class="pulse-wrap" id="pulseWrap">
      <svg viewBox="0 0 1000 120" preserveAspectRatio="none">
        <path id="pulsePath" fill="none" stroke="#5FD068" stroke-width="5" stroke-linecap="round"/>
      </svg>
      <div class="clock-badge" id="clockBadge">1:15</div>
    </div>

    <div class="stage">
      <div class="target" id="targetText"></div>
    </div>

    <div class="heard-row">
      <span class="heard-label">Heard:</span>
      <span class="heard-text idle" id="heardText" aria-live="polite">—</span>
    </div>

    <div class="mic-wrap">
      <button class="mic-btn" id="micBtn" aria-label="Hold to speak">🎤</button>
      <div class="mic-hint">Press and hold, say it clearly, then let go</div>
    </div>
  </section>

  <!-- ===================== END SCREEN ===================== -->
  <section id="end" class="screen">
    <div class="end-title" id="endTitle">Time's up</div>
    <div class="end-stats" id="endStats"></div>
    <div class="end-btns">
      <button id="playAgainBtn" class="primary">Play again</button>
      <button id="backToSetupBtn">Back to setup</button>
    </div>
  </section>

</div>

<script>
(function(){
  "use strict";

  /* ============================================================
     TEACHER CONFIG — edit these before each class.
     Round lengths: every student gets the exact same value, so
     scores stay comparable when you write them on the board.
     No UI control for these on purpose.
     ============================================================ */
  var CONFIG = {
    wordRoundSeconds: 75,       // round length when "Words" mode is selected
    sentenceRoundSeconds: 150   // round length when "Sentences" mode is selected
  };

  /* ---------------- Sample content ---------------- */
  var SAMPLE_WORDS =
"photosynthesis|hard\n" +
"particularly|hard\n" +
"comfortable|medium\n" +
"vegetable|medium\n" +
"necessary|hard\n" +
"schedule|hard\n" +
"library|medium\n" +
"through|medium\n" +
"cat|easy\n" +
"dog|easy";

  var SAMPLE_SENTENCES =
"Q: What do you usually do on weekends?\n" +
"A: I usually play soccer with my friends.\n" +
"Q: What is your favorite subject at school?\n" +
"A: My favorite subject is English because it is fun.\n" +
"Q: How do you get to school every day?\n" +
"A: I get to school by bike every day.";

  /* ---------------- DOM refs ---------------- */
  var screens = {
    setup: document.getElementById('setup'),
    game: document.getElementById('game'),
    end: document.getElementById('end')
  };
  var listInput = document.getElementById('listInput');
  var listLabel = document.getElementById('listLabel');
  var listHint = document.getElementById('listHint');
  var bubbleGrid = document.getElementById('bubbleGrid');
  var editListToggle = document.getElementById('editListToggle');
  var editListPanel = document.getElementById('editListPanel');
  var roundLengthDisplay = document.getElementById('roundLengthDisplay');
  var shuffleCheck = document.getElementById('shuffleCheck');
  var startBtn = document.getElementById('startBtn');
  var unsupportedWarning = document.getElementById('unsupportedWarning');

  var quitBtn = document.getElementById('quitBtn');
  var modeLabel = document.getElementById('modeLabel');
  var progressText = document.getElementById('progressText');
  var clearedText = document.getElementById('clearedText');
  var pulseWrap = document.getElementById('pulseWrap');
  var pulsePath = document.getElementById('pulsePath');
  var clockBadge = document.getElementById('clockBadge');
  var targetText = document.getElementById('targetText');
  var heardText = document.getElementById('heardText');
  var micBtn = document.getElementById('micBtn');

  var endTitle = document.getElementById('endTitle');
  var endStats = document.getElementById('endStats');
  var playAgainBtn = document.getElementById('playAgainBtn');
  var backToSetupBtn = document.getElementById('backToSetupBtn');

  var modeRadios = document.querySelectorAll('input[name=mode]');

  /* ---------------- Speech recognition setup ---------------- */
  var SpeechRecognitionImpl = window.SpeechRecognition || window.webkitSpeechRecognition;
  var SR_SUPPORTED = !!SpeechRecognitionImpl;
  var recognition = null;
  if (SR_SUPPORTED) {
    recognition = new SpeechRecognitionImpl();
    recognition.lang = 'en-US';
    recognition.continuous = false;
    recognition.interimResults = true;
    recognition.maxAlternatives = 1;
  } else {
    unsupportedWarning.style.display = 'block';
    startBtn.disabled = true;
  }

  /* ---------------- Game state ---------------- */
  var state = {
    mode: 'word',
    list: [],
    index: 0,
    cleared: 0,
    totalMs: 75000,
    remainingMs: 75000,
    pausedUntil: 0,
    running: false,
    listening: false,
    busy: false
  };
  var lastFinalTranscript = '';
  var tickHandle = null;
  var watchdogHandle = null;

  /* ---------------- Helpers: matching ---------------- */
  function normalize(str){
    return (str || '').toLowerCase().replace(/[^\w\s']/g, '').replace(/\s+/g, ' ').trim();
  }

  function levenshtein(a, b){
    var m = a.length, n = b.length;
    if (m === 0) return n;
    if (n === 0) return m;
    var dp = [];
    for (var i = 0; i <= m; i++){ dp.push(new Array(n+1).fill(0)); dp[i][0] = i; }
    for (var j = 0; j <= n; j++) dp[0][j] = j;
    for (i = 1; i <= m; i++){
      for (j = 1; j <= n; j++){
        if (a[i-1] === b[j-1]) dp[i][j] = dp[i-1][j-1];
        else dp[i][j] = 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
      }
    }
    return dp[m][n];
  }

  function wordsClose(a, b){
    if (a === b) return true;
    if (Math.min(a.length, b.length) <= 3) return a === b;
    return levenshtein(a, b) <= 1;
  }

  // Allowed edit-distance is a flat, capped number rather than a percentage
  // Allowed edit-distance scales UP with word length, not down. The
  // recognizer's own transcription accuracy drops on longer/rarer words
  // regardless of pronunciation quality (less training data to draw on),
  // so longer/harder words need more tolerance for that noise, not less.
  // Difficulty nudges the tolerance by one step either way.
  function maxAllowedDistance(len, difficulty){
    var base = Math.max(1, Math.round(len * 0.25)); // roughly 1 edit per 4 letters
    if (difficulty === 'easy') return Math.max(1, base - 1);
    if (difficulty === 'hard') return base + 1;
    return base; // medium
  }

  function isWordMatch(target, heard, difficulty){
    var t = normalize(target), h = normalize(heard);
    if (!h) return false;
    var dist = levenshtein(t, h);
    return dist <= maxAllowedDistance(t.length, difficulty);
  }

  function sentenceSimilarity(target, heard){
    var t = normalize(target).split(' ').filter(Boolean);
    var h = normalize(heard).split(' ').filter(Boolean);
    if (!h.length || !t.length) return 0;
    var hi = 0, matches = 0;
    for (var k1 = 0; k1 < t.length; k1++){
      var tw = t[k1];
      var found = -1;
      for (var k2 = hi; k2 < h.length; k2++){
        if (wordsClose(tw, h[k2])) { found = k2; break; }
      }
      if (found >= 0) { matches++; hi = found + 1; }
    }
    return matches / t.length;
  }

  /* ---------------- List parsing ---------------- */
  function parseList(raw, mode){
    var lines = raw.split('\n').map(function(l){ return l.trim(); }).filter(Boolean);
    if (mode === 'word'){
      return lines.map(function(l){
        var parts = l.split('|').map(function(s){ return s.trim(); });
        return { type: 'word', text: parts[0], difficulty: (parts[1] || 'medium').toLowerCase() };
      }).filter(function(it){ return it.text; });
    }
    return lines.filter(function(l){ return /^[QA]:/i.test(l); }).map(function(l){
      var type = l[0].toUpperCase() === 'Q' ? 'question' : 'answer';
      return { type: type, text: l.slice(2).trim() };
    }).filter(function(it){ return it.text; });
  }

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }

  // Renders the current list as a grid of colorful bubbles instead of a
  // plain textarea — this is what students actually see; the textarea
  // becomes an optional "Edit" panel for whoever is configuring the list.
  function renderBubbles(){
    var mode = currentMode();
    var list = parseList(listInput.value, mode);
    if (!list.length){
      bubbleGrid.innerHTML = '<div class="bubble-empty">Add some words above to see them here ✨</div>';
      return;
    }
    bubbleGrid.innerHTML = list.map(function(item, i){
      if (mode === 'word'){
        var stars = item.difficulty === 'hard' ? '⭐⭐⭐' : item.difficulty === 'easy' ? '⭐' : '⭐⭐';
        return '<span class="word-bubble bubble-' + (i % 6) + '">' + escapeHtml(item.text) +
               '<span class="bubble-stars">' + stars + '</span></span>';
      }
      var isQ = item.type === 'question';
      return '<span class="word-bubble ' + (isQ ? 'bubble-5' : 'bubble-1') + '">' +
             '<span class="bubble-tag">' + (isQ ? 'Q' : 'A') + '</span>' + escapeHtml(item.text) + '</span>';
    }).join('');
  }

  function shuffle(arr){
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--){
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
    }
    return a;
  }

  /* ---------------- Setup screen behaviour ---------------- */
  // Tracks whether the textarea still holds one of the built-in samples
  // (in which case switching modes is allowed to swap it) vs text the
  // teacher/student has actually typed (which is never overwritten).
  var listIsCustom = false;

  function currentMode(){
    var checked = document.querySelector('input[name=mode]:checked');
    return checked ? checked.value : 'word';
  }

  function updateRoundLengthDisplay(){
    var mode = currentMode();
    var secs = mode === 'word' ? CONFIG.wordRoundSeconds : CONFIG.sentenceRoundSeconds;
    roundLengthDisplay.textContent = secs + 's — same for everyone';
  }

  function refreshSetupForMode(){
    var mode = currentMode();
    if (mode === 'word'){
      listLabel.textContent = '📝 Word list';
      listHint.textContent = 'One word per line. Add |easy, |medium, or |hard after a word to set difficulty (e.g. "necessary|hard"). Difficulty just affects how strict the pronunciation match is.';
      if (!listIsCustom) listInput.value = SAMPLE_WORDS;
    } else {
      listLabel.textContent = '🗨️ Questions & answers';
      listHint.textContent = 'One line per item, prefixed with "Q:" or "A:". Each question and each answer is its own read-aloud item.';
      if (!listIsCustom) listInput.value = SAMPLE_SENTENCES;
    }
    updateRoundLengthDisplay();
    renderBubbles();
  }

  modeRadios.forEach(function(r){ r.addEventListener('change', refreshSetupForMode); });
  listInput.addEventListener('input', function(){
    listIsCustom = (listInput.value !== SAMPLE_WORDS && listInput.value !== SAMPLE_SENTENCES);
    renderBubbles();
  });
  editListToggle.addEventListener('click', function(){
    var isOpen = editListPanel.style.display !== 'none';
    editListPanel.style.display = isOpen ? 'none' : 'block';
    editListToggle.textContent = isOpen ? '✏️ Edit' : '✅ Done';
  });
  refreshSetupForMode();

  /* ---------------- Screen switching ---------------- */
  function showScreen(name){
    Object.keys(screens).forEach(function(k){
      screens[k].classList.toggle('active', k === name);
    });
  }

  /* ---------------- Pulse visual ---------------- */
  var pulsePhase = 0;
  function drawPulse(fraction){
    // fraction: 0..1 of time remaining
    var amp = 8 + fraction * 38;
    var pts = [];
    var steps = 40;
    for (var i = 0; i <= steps; i++){
      var x = (i / steps) * 1000;
      var noise = Math.sin(pulsePhase + i * 0.9) * amp + Math.sin(pulsePhase * 0.4 + i * 0.35) * amp * 0.3;
      var y = 60 + noise * (0.4 + 0.6 * fraction);
      pts.push(x.toFixed(1) + ',' + y.toFixed(1));
    }
    pulsePath.setAttribute('d', 'M' + pts.join(' L'));
    pulsePhase += 0.6;

    var color = '#5FD068';
    if (fraction < 0.2) color = '#FF5C5C';
    else if (fraction < 0.5) color = '#F2B705';
    pulsePath.setAttribute('stroke', color);
  }

  function spikeFx(){
    pulseWrap.classList.remove('spike');
    void pulseWrap.offsetWidth;
    pulseWrap.classList.add('spike');
  }

  function formatClock(ms){
    var s = Math.max(0, Math.ceil(ms / 1000));
    var m = Math.floor(s / 60);
    var r = s % 60;
    return m + ':' + (r < 10 ? '0' : '') + r;
  }

  /* ---------------- Game loop ---------------- */
  function startTickLoop(){
    if (tickHandle) clearInterval(tickHandle);
    tickHandle = setInterval(tick, 100);
  }
  function stopTickLoop(){
    if (tickHandle) clearInterval(tickHandle);
    tickHandle = null;
  }

  function tick(){
    if (!state.running) return;
    var now = performance.now();
    if (now >= state.pausedUntil){
      state.remainingMs -= 100;
    }
    var fraction = Math.max(0, state.remainingMs / state.totalMs);
    drawPulse(fraction);
    clockBadge.textContent = formatClock(state.remainingMs);
    if (state.remainingMs <= 0){
      endGame('time');
    }
  }

  function loadCurrentItem(){
    var item = state.list[state.index];
    targetText.textContent = item.text;
    targetText.className = 'target ' + (state.mode === 'word' ? 'mode-word' : 'mode-sentence');
    progressText.textContent = (state.index + 1) + '/' + state.list.length;
    clearedText.textContent = state.cleared;
    setHeard('—', 'idle');
  }

  function setHeard(text, cls){
    heardText.textContent = text;
    heardText.className = 'heard-text ' + cls;
  }

  function onCorrect(){
    state.cleared++;
    var pauseMs = state.mode === 'word' ? 500 : 2500;
    state.pausedUntil = performance.now() + pauseMs;
    spikeFx();
    targetText.classList.remove('listening', 'voice-pulse', 'miss');
    targetText.classList.add('hit');
    clearedText.textContent = state.cleared;
    // Hold the green fill visibly for the same window the timer is paused,
    // then swap to the next item right as the timer resumes draining.
    setTimeout(function(){
      if (!state.running) return;
      state.index++;
      if (state.index >= state.list.length){
        endGame('cleared');
        return;
      }
      loadCurrentItem();
    }, pauseMs);
  }

  function evaluateAttempt(transcript){
    if (!state.running) return;
    if (!transcript){
      setHeard('No speech caught — hold the button and try again', 'miss');
      return;
    }
    var item = state.list[state.index];
    var pass;
    if (state.mode === 'word'){
      pass = isWordMatch(item.text, transcript, item.difficulty);
    } else {
      pass = sentenceSimilarity(item.text, transcript) >= 0.85;
    }
    setHeard(transcript, pass ? 'hit' : 'miss');
    if (pass){
      onCorrect();
    } else {
      targetText.classList.remove('listening', 'voice-pulse');
      targetText.classList.add('miss');
      setTimeout(function(){
        targetText.classList.remove('miss');
      }, 450);
    }
  }

  function endGame(reason){
    state.running = false;
    stopTickLoop();
    if (state.listening) stopListening();
    var total = state.list.length;
    if (reason === 'cleared'){
      endTitle.textContent = 'Cleared the whole list!';
      endStats.textContent = total + ' / ' + total + ' — with ' + formatClock(state.remainingMs) + ' to spare';
    } else {
      endTitle.textContent = "Time's up";
      endStats.textContent = 'You cleared ' + state.cleared + ' / ' + total;
    }
    showScreen('end');
  }

  /* ---------------- Mic / recognition handling ---------------- */
  function pulseTargetVoice(){
    // Retriggers the CSS animation each time a speech chunk actually
    // arrives — removing then re-adding the class forces a restart.
    targetText.classList.remove('voice-pulse');
    void targetText.offsetWidth; // force reflow
    targetText.classList.add('voice-pulse');
  }

  function startListening(){
    if (!SR_SUPPORTED || state.listening || state.busy || !state.running) return;
    state.listening = true;
    lastFinalTranscript = '';
    setHeard('Listening…', 'live');
    micBtn.classList.remove('checking');
    micBtn.classList.add('active');
    targetText.classList.remove('hit', 'miss');
    targetText.classList.add('listening');
    try { recognition.start(); } catch(e) { /* ignore if engine already mid-cycle */ }

    // Safety net only — if the engine somehow never finishes on its own
    // (e.g. a network hiccup), force it to stop after a generous timeout
    // so the game can't get permanently stuck. Should rarely if ever fire.
    var maxMs = state.mode === 'word' ? 8000 : 18000;
    watchdogHandle = setTimeout(function(){
      if (state.listening) { try { recognition.stop(); } catch(e){} }
    }, maxMs);
  }

  function stopListening(){
    // Called on button release. This deliberately does NOT force the
    // recognizer to stop — it keeps listening and finishes on its own
    // once it detects the student has stopped talking, so the tail end
    // of a word is never cut off just because a finger lifted. Release
    // only changes what the button looks like, not what the engine does.
    if (!SR_SUPPORTED || !state.listening || state.busy) return;
    micBtn.classList.remove('active');
    micBtn.classList.add('checking');
    targetText.classList.remove('listening');
    setHeard('Checking…', 'live');
    state.busy = true;
  }

  if (SR_SUPPORTED){
    recognition.onresult = function(e){
      var interim = '', final = '';
      for (var i = e.resultIndex; i < e.results.length; i++){
        var tr = e.results[i][0].transcript;
        if (e.results[i].isFinal) final += tr; else interim += tr;
      }
      if (final) lastFinalTranscript = final.trim();
      if (state.running && !state.busy){
        setHeard(final || interim || '…', 'live');
        pulseTargetVoice();
      }
    };

    recognition.onerror = function(e){
      if (!state.running) return;
      if (e.error === 'no-speech'){
        setHeard('Didn\'t catch that — try again', 'miss');
      } else if (e.error === 'not-allowed' || e.error === 'service-not-allowed'){
        setHeard('Microphone blocked — check browser permissions', 'error');
      } else if (e.error === 'network'){
        setHeard('Network error — needs an internet connection', 'error');
      } else {
        setHeard('Recognition error (' + e.error + ')', 'error');
      }
    };

    recognition.onend = function(){
      state.listening = false;
      state.busy = false;
      micBtn.classList.remove('checking');
      if (watchdogHandle) { clearTimeout(watchdogHandle); watchdogHandle = null; }
      evaluateAttempt(lastFinalTranscript);
    };
  }

  micBtn.addEventListener('pointerdown', function(e){ e.preventDefault(); startListening(); });
  ['pointerup','pointercancel','pointerleave'].forEach(function(evt){
    micBtn.addEventListener(evt, function(e){ e.preventDefault(); stopListening(); });
  });
  micBtn.addEventListener('contextmenu', function(e){ e.preventDefault(); });

  document.addEventListener('keydown', function(e){
    if (e.code === 'Space' && screens.game.classList.contains('active')){
      e.preventDefault();
      startListening();
    }
  });
  document.addEventListener('keyup', function(e){
    if (e.code === 'Space' && screens.game.classList.contains('active')){
      e.preventDefault();
      stopListening();
    }
  });

  /* ---------------- Start / quit / replay ---------------- */
  function beginRound(list, mode, seconds){
    state.mode = mode;
    state.list = shuffleCheck.checked ? shuffle(list) : list;
    state.totalMs = seconds * 1000;
    state.remainingMs = state.totalMs;
    state.index = 0;
    state.cleared = 0;
    state.pausedUntil = 0;
    pulsePhase = 0;
    modeLabel.textContent = mode === 'word' ? 'Words' : 'Sentences';
    showScreen('game');
    loadCurrentItem();
    drawPulse(1);
    clockBadge.textContent = formatClock(state.remainingMs);
    state.running = true;
    startTickLoop();
  }

  var lastRoundConfig = null;

  startBtn.addEventListener('click', function(){
    var mode = currentMode();
    var list = parseList(listInput.value, mode);
    if (!list.length){
      alert('Add at least one item to the list first.');
      return;
    }
    var seconds = mode === 'word' ? CONFIG.wordRoundSeconds : CONFIG.sentenceRoundSeconds;
    lastRoundConfig = { list: list, mode: mode, seconds: seconds };
    beginRound(list, mode, seconds);
  });

  quitBtn.addEventListener('click', function(){
    if (state.running) endGame('time');
    showScreen('setup');
  });

  playAgainBtn.addEventListener('click', function(){
    if (lastRoundConfig) beginRound(lastRoundConfig.list, lastRoundConfig.mode, lastRoundConfig.seconds);
  });

  backToSetupBtn.addEventListener('click', function(){
    showScreen('setup');
  });

})();
</script>
</body>
</html>
